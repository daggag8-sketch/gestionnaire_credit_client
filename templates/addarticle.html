{% extends "base.html" %}

{% block title %}Ajouter Article{% endblock %}

{% block content %}

<div class="form-box">

    <h2>📚 Ajouter un article</h2>

    <form method="POST">
        <input type="text" name="nom_art" placeholder="Nom de l'article" required>
        <input type="number" name="prix_unitaire" step="0.01" placeholder="Prix unitaire" required>
        <input type="number" name="stock" min="0" placeholder="Stock" required>
        <input type="text" name="description" placeholder="Description" required>
        <button type="submit">Ajouter</button>
    </form>

</div>

{% endblock %}
