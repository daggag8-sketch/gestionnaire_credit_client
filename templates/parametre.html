{% extends "base.html" %}

{% block title %}Paramètres{% endblock %}
{% block header %}⚙️ Paramètres{% endblock %}

{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<div class="form-box">

    <h2>👤 Mon profil</h2>

    <form method="POST">

        <label>Nom d'utilisateur</label>
        <input type="text" name="nom_user" value="{{ current_user.nom_user }}" required>

        <label>Téléphone</label>
        <input type="text" name="telephone" value="{{ current_user.telephone }}" required>

        <hr style="margin:20px 0;">

        <h3 style="margin-bottom:10px;">🔐 Changer le mot de passe</h3>
        <p style="color:var(--muted); font-size:11px; margin-bottom:10px;">
            Laisse vide si tu ne veux pas changer ton mot de passe.
        </p>

        <label>Ancien mot de passe</label>
        <div class="password-box">
            <input type="password" id="ancien" name="ancien_mot_de_passe">
            <i class="fa-solid fa-eye-slash" onclick="toggle('ancien', this)"></i>
        </div>

        <label>Nouveau mot de passe</label>
        <div class="password-box">
            <input type="password" id="nouveau" name="nouveau_mot_de_passe">
            <i class="fa-solid fa-eye-slash" onclick="toggle('nouveau', this)"></i>
        </div>

        <br>
        <button type="submit">💾 Enregistrer</button>

    </form>

</div>

<script>
function toggle(id, icon) {
    const input = document.getElementById(id);
    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    }
}
</script>

{% endblock %}
